name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
  release:
    types: [published]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: pytest

  build-mac:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-app.txt
      - run: python3 scripts/generate_icons.py
      - run: python3 setup.py py2app
      - run: chmod +x create_dmg.sh && ./create_dmg.sh
      - uses: actions/upload-artifact@v4
        with:
          name: notification-watcher-macos
          path: dist/*.dmg

  build-win:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements-windows.txt -r requirements-dev.txt
      - run: python scripts/generate_icons.py
      - run: pyinstaller notification_watcher.spec
      - name: Zip Windows build
        shell: pwsh
        run: |
          $version = python -c "from notification_watcher.version import __version__; print(__version__)"
          Compress-Archive -Path dist/NotificationWatcher -DestinationPath "dist/NotificationWatcher-$version-win.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: notification-watcher-windows
          path: dist/*.zip

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name '*.dmg' -o -name '*.zip' \) -exec cp {} release/ \;
          ls -la release/
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
